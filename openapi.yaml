openapi: 3.1.0

info:
  title: Partner API Specification
  version: 0.0.3
  description: |
    ## 푸드팡 파트너 전용 주문 연동 문서

    본 문서는 개발 전 인터페이스 확정을 위한 **초안(Draft)**입니다.

    ## 변경 이력

    ### 0.0.3
    - `POST /api/partner/v1/products/order-check` 엔드포인트 추가
      - 상품 ID 목록을 받아 현재 상태와 금액을 일괄 조회합니다.

    ### 0.0.2
    - `ProductResponse.order_closing_time` 필드를 nullable로 변경
      - 주문 불가 상품 목록(`unavailable_products`)에 마감시간을 확인할 수 없는 상품도 포함됩니다.
      - 해당 경우 `order_closing_time`은 `null`로 응답합니다.

    ### 0.0.1
    - 최초 작성

    ### 1. 기본 설정
    - Base URL
      - Production : `https://admin.foodpang.co/admin/api/partner/v1`(배포전)
      - TEST : `https://inhouse.foodpang.co/pa/api/partner/v1`
    - 모든 요청은 `Content-Type: application/json`을 사용합니다.
    
    ### 2. 인증 방식 (Authentication)
    인증은 아래 두 가지 방식 중 하나를 선택하여 사용합니다.

    #### 방식 A: Basic Auth
    - 헤더에 `Authorization` 추가
    - 값: `Basic base64(keyId:secret)`

    #### 방식 B: Custom Header
    - `X-Api-Key`: `pac_xxx`
    - `X-Api-Secret`: `pas_xxx`

  contact:
    name: 푸드팡 개발팀
    email: dev@foodpang.com
    url: https://foodpang.co

  license:
    name: Proprietary
    url: https://foodpang.co

tags:
  - name: Authentication
    description: 인증 상태 확인
  - name: Orders
    description: 주문 생성
  - name: Products
    description: 상품 조회 및 상태 확인

paths:
  /api/partner/v1/auth/me:
    get:
      summary: 내 인증 정보 확인
      description: 현재 API 키로 인증된 파트너 정보를 반환합니다.
      operationId: getMe
      tags:
        - Authentication
      responses:
        '200':
          description: 인증 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RestResponse'
                  - type: object
                    properties:
                      content:
                        $ref: '#/components/schemas/PartnerMeResponse'
              example:
                code: 0
                message: ok
                content:
                  key_id: pac_abc123
                  name: 트리시스
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1000
                message: 인증이 올바르지 않습니다.
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1001
                message: 권한이 부족합니다.

  /api/partner/v1/orders:
    post:
      summary: 주문 생성
      description: 파트너 주문을 생성합니다.
      operationId: createOrder
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            example:
              company_id: 1001
              items:
                - product_id: 31208
                  amount: 3
                - product_id: 31209
                  amount: 1
      responses:
        '201':
          description: 주문 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RestResponse'
                  - type: object
                    properties:
                      content:
                        $ref: '#/components/schemas/OrderCreateResponse'
              example:
                code: 0
                message: ok
                content:
                  order_id: 11
                  items:
                    - id: 501
                      product_id: 31208
                      product_name: 유기농 사과
                      product_tax_type: TAXATION
                      product_storage_temperature: AMBIENT
                      product_origin: 국내산
                      product_grade: null
                      product_brand: null
                      product_thumbnail_image: https://pa.foodpang.co/media/resized-product/31208/representative_image?tag=abc123
                      unit_price: 5000
                      amount: 3
                      expected_delivery_date: "2026-04-25T00:00:00Z"
                    - id: 502
                      product_id: 31209
                      product_name: 제주 감귤
                      product_tax_type: TAX_FREE
                      product_storage_temperature: COLD
                      product_origin: 수입산
                      product_grade: null
                      product_brand: null
                      product_thumbnail_image: https://pa.foodpang.co/media/resized-product/31209/representative_image?tag=def456
                      unit_price: 3000
                      amount: 1
                      expected_delivery_date: "2026-04-25T00:00:00Z"
        '400':
          description: 요청 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                필드_검증_오류:
                  summary: 필드 검증 실패 (2000)
                  value:
                    code: 2000
                    message: 요청이 올바르지 않습니다.
                    fields:
                      company_id: 널이어서는 안됩니다
                      items[0].amount: 1 이상이어야 합니다
                주문_마감:
                  summary: 주문 마감 상태 (2001)
                  value:
                    code: 2001
                    message: 현재 주문이 마감된 상태입니다. 다음 주문 가능 시간에 다시 시도해 주세요.
                주문불가_상품_전체:
                  summary: 요청 상품 전부 주문 불가 (2002)
                  value:
                    code: 2002
                    message: 요청한 상품이 모두 주문 불가 상태입니다.
                지사_주문불가:
                  summary: 지사 주문 불가 상태 (2003)
                  value:
                    code: 2003
                    message: 현재 주문이 불가한 지사입니다. 담당자에게 문의해 주세요.
                진행중인_주문_존재:
                  summary: 이미 진행 중인 주문 (2004)
                  value:
                    code: 2004
                    message: 이미 진행 중인 주문이 있습니다.
                배송지_주소_없음:
                  summary: 업체 배송지 미설정 (2005)
                  value:
                    code: 2005
                    message: 업체의 배송지 주소 정보가 없습니다. 담당자에게 문의해 주세요.
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1000
                message: 인증이 올바르지 않습니다.
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1001
                message: 권한이 부족합니다.
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 9999
                message: 서버 오류가 발생했습니다.

  /api/partner/v1/products/order-check:
    post:
      summary: 상품 상태, 금액 일괄 조회
      description: |
        상품 ID 목록을 받아 현재 상태, 금액을 일괄 반환합니다.

        - 요청한 ID 중 파트너 계정의 지사에 속하지 않는 상품은 응답에서 제외됩니다.
        - 최대 100개까지 조회 가능합니다.
      operationId: getProductStatus
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductOrderCheckRequest'
            example:
              product_ids: [127986, 127987, 127988]
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int64
                    example: 0
                  message:
                    type: string
                    example: ok
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductOrderCheckResponse'
              example:
                code: 0
                message: ok
                content:
                  - id: 127986
                    sale_price: 3000
                    status: ENABLED
                  - id: 127987
                    sale_price: 1000
                    status: SUSPENDED
                  - id: 127988
                    sale_price: 13000
                    status: DISABLED
        '400':
          description: 요청 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 2000
                message: 요청이 올바르지 않습니다.
                fields:
                  product_ids: 비어 있으면 안됩니다
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1000
                message: 인증이 올바르지 않습니다.
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1001
                message: 권한이 부족합니다.

  /api/partner/v1/products:
    get:
      summary: 상품 목록 조회
      description: |
        파트너 계정에 연결된 지사의 전체 상품 목록을 조회합니다.

        - 카테고리 구분 없이 모든 상품을 반환합니다.
        - 페이지네이션으로만 조회 범위를 제어합니다.
      operationId: getProducts
      tags:
        - Products
      parameters:
        - name: page_id
          in: query
          required: false
          description: 페이지 번호 (1부터 시작)
          schema:
            type: integer
            format: int64
            default: 1
            minimum: 1
          example: 1
        - name: page_size
          in: query
          required: false
          description: 페이지당 상품 수
          schema:
            type: integer
            format: int64
            default: 20
            minimum: 1
            maximum: 100
          example: 20
        - name: status
          in: query
          required: false
          description: |-
            조회할 상품 상태. 지정하지 않으면 전체 상태를 조회합니다.
            - DISABLED: 사용중지
            - SUSPENDED: 일시중지(품절)
            - ENABLED: 사용중
          schema:
            type: string
            enum: [DISABLED, SUSPENDED, ENABLED]
          example: ENABLED
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/RestPageResponse'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/PartnerProductResponse'
              example:
                code: 0
                message: ok
                content:
                  - id: 11
                    name: 두절콩나물(박스/2kg내외/수입산)
                    sale_price: 4180
                    tax_type: TAX_FREE
                    storage_temperature: AMBIENT
                    origin: 수입산
                    grade: null
                    brand: null
                    min_amount: 1
                    max_amount: 99
                    thumbnail_image: https://pa.foodpang.co/media/resized-product/11/representative_image?tag=1960bebb0250e24cfc19c15c065c7286
                    order_closing_time: "15:00"
                    status: ENABLED
                  - id: 6
                    name: 애기느타리(1kg내외/국내산)
                    sale_price: 0
                    tax_type: TAX_FREE
                    storage_temperature: COLD
                    origin: 국내산
                    grade: null
                    brand: null
                    min_amount: 1
                    max_amount: 50
                    thumbnail_image: https://pa.foodpang.co/media/resized-product/6/representative_image?tag=729e2eeaed6c9dfe29309b1940239436
                    order_closing_time: "22:00"
                    status: SUSPENDED
                page:
                  page_size: 20
                  page_id: 1
                  total_elements: 42
                  total_pages: 2
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1000
                message: 인증이 올바르지 않습니다.
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 1001
                message: 권한이 부족합니다.
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 9999
                message: 서버 오류가 발생했습니다.

components:
  schemas:
    RestResponse:
      type: object
      properties:
        code:
          type: integer
          format: int64
          description: 결과 코드 (성공 시 0)
          example: 0
        message:
          type: string
          description: 결과 메시지 (성공 시 "ok")
          example: ok
      example:
        code: 0
        message: ok

    RestPageResponse:
      type: object
      properties:
        code:
          type: integer
          format: int64
          description: 결과 코드 (성공 시 0)
          example: 0
        message:
          type: string
          description: 결과 메시지 (성공 시 "ok")
          example: ok
        page:
          $ref: '#/components/schemas/PageInfo'
      example:
        code: 0
        message: ok
        content: []
        page:
          page_size: 20
          page_id: 1
          total_elements: 0
          total_pages: 0

    PageInfo:
      type: object
      properties:
        page_size:
          type: integer
          format: int64
          description: 페이지당 항목 수
          example: 20
        page_id:
          type: integer
          format: int64
          description: 현재 페이지 번호
          example: 1
        total_elements:
          type: integer
          format: int64
          description: 전체 항목 수
          example: 42
        total_pages:
          type: integer
          format: int64
          description: 전체 페이지 수 (total_elements / page_size 내림)
          example: 2

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          format: int64
          description: 에러 코드
          example: 2000
        message:
          type: string
          description: 에러 메시지
        fields:
          type: object
          description: 필드별 유효성 검사 오류 메시지. 요청 검증 실패 시에만 포함됩니다.
          additionalProperties:
            type: string
          example:
            company_id: 널이어서는 안됩니다
            items[0].amount: 1 이상이어야 합니다

    PartnerMeResponse:
      type: object
      properties:
        key_id:
          type: string
          description: API Key ID
          example: pac_abc123
        name:
          type: string
          description: 파트너사명
          example: 트리시스

    OrderCreateRequest:
      type: object
      required:
        - company_id
        - items
      properties:
        company_id:
          type: integer
          format: int64
          description: 주문업체 ID
          minimum: 1
          example: 1001
        items:
          type: array
          minItems: 1
          description: 주문 상품 목록
          items:
            $ref: '#/components/schemas/OrderCreateRequestItem'

    OrderCreateRequestItem:
      type: object
      required:
        - product_id
        - amount
      properties:
        product_id:
          type: integer
          format: int64
          description: 상품 ID
          minimum: 1
          example: 31208
        amount:
          type: integer
          format: int64
          description: 주문 수량
          minimum: 1
          example: 3

    OrderCreateResponse:
      type: object
      required:
        - order_id
        - items
      properties:
        order_id:
          type: integer
          format: int64
          description: 생성된 주문 ID
          example: 11
        items:
          type: array
          description: 주문 상품 목록
          items:
            $ref: '#/components/schemas/OrderCreateResponseItem'
        unavailable_products:
          type: array
          description: 주문 불가 상태(사용중지, 일시중지)로 인해 주문에서 제외된 상품 목록
          items:
            $ref: '#/components/schemas/PartnerProductResponse'

    OrderCreateResponseItem:
      type: object
      required:
        - id
        - product_id
        - product_name
        - product_tax_type
        - product_storage_temperature
        - product_thumbnail_image
        - unit_price
        - amount
        - expected_delivery_date
      properties:
        id:
          type: integer
          format: int64
          description: 주문 아이템 ID
          example: 501
        product_id:
          type: integer
          format: int64
          description: 상품 ID
          example: 31208
        product_name:
          type: string
          description: 상품명
          example: 유기농 사과
        product_tax_type:
          type: string
          description: |-
            과세 유형
            - TAXATION: 과세
            - TAX_FREE: 면세
          enum: [TAXATION, TAX_FREE]
          example: TAXATION
        product_storage_temperature:
          type: string
          description: |-
            보관 온도
            - AMBIENT: 상온
            - ROOM: 실온
            - COLD: 냉장
            - FREEZE: 냉동
          enum: [AMBIENT, ROOM, COLD, FREEZE]
          example: COLD
        product_origin:
          type: string
          nullable: true
          description: 원산지. 값이 없으면 null로 응답합니다.
          example: 국내산
        product_grade:
          type: string
          nullable: true
          description: 등급. 값이 없거나 빈 문자열이면 null로 응답합니다.
          example: 1등급
        product_brand:
          type: string
          nullable: true
          description: 브랜드. 값이 없거나 빈 문자열이면 null로 응답합니다.
          example: 풀무원
        product_thumbnail_image:
          type: string
          description: 상품 썸네일 이미지 전체 URL
          example: https://pa.foodpang.co/media/resized-product/31208/representative_image?tag=abc123
        unit_price:
          type: integer
          format: int64
          description: 단가
          example: 5000
        amount:
          type: integer
          format: int64
          description: 주문 수량
          example: 3
        expected_delivery_date:
          type: string
          format: date-time
          description: 배송 예정일 (basket_item_extra 기준, 없으면 주문의 기본 배송 예정일)
          example: "2026-04-25T00:00:00Z"

    ProductOrderCheckRequest:
      type: object
      required:
        - product_ids
      properties:
        product_ids:
          type: array
          minItems: 1
          maxItems: 100
          description: 조회할 상품 ID 목록 (최대 100개)
          items:
            type: integer
            format: int64
          example: [127986, 127987, 127988]

    ProductOrderCheckResponse:
      type: object
      required:
        - id
        - sale_price
        - status
      properties:
        id:
          type: integer
          format: int64
          description: 상품 ID
          example: 127986
        sale_price:
          type: integer
          format: int64
          description: 판매 금액
          example: 10000
        status:
          type: string
          description: |-
            상품 상태
            - DISABLED: 사용중지
            - SUSPENDED: 일시중지(품절)
            - ENABLED: 사용중
          enum: [DISABLED, SUSPENDED, ENABLED]
          example: ENABLED

    PartnerProductResponse:
      type: object
      required:
        - id
        - name
        - tax_type
        - storage_temperature
        - min_amount
        - max_amount
        - thumbnail_image
        - status
      properties:
        id:
          type: integer
          format: int64
          description: 상품 ID
          example: 11
        name:
          type: string
          description: 상품명
          example: 유기농 방울토마토
        sale_price:
          type: integer
          format: int64
          nullable: true
          description: 판매가 (원). 값이 없으면 null로 응답합니다.
          example: 12000
        tax_type:
          type: string
          description: |-
            과세 유형
            - TAXATION: 과세
            - TAX_FREE: 면세
          enum: [TAXATION, TAX_FREE]
          example: TAXATION
        storage_temperature:
          type: string
          description: |-
            보관 온도
            - AMBIENT: 상온
            - ROOM: 실온
            - COLD: 냉장
            - FREEZE: 냉동
          enum: [AMBIENT, ROOM, COLD, FREEZE]
          example: COLD
        origin:
          type: string
          nullable: true
          description: 원산지. 값이 없으면 null로 응답합니다.
          example: 국내산
        grade:
          type: string
          nullable: true
          description: 등급. 값이 없거나 빈 문자열이면 null로 응답합니다.
          example: 1등급
        brand:
          type: string
          nullable: true
          description: 브랜드. 값이 없거나 빈 문자열이면 null로 응답합니다.
          example: 풀무원
        min_amount:
          type: integer
          format: int32
          description: 최소 주문 수량
          example: 1
        max_amount:
          type: integer
          format: int32
          description: 최대 주문 수량
          example: 99
        thumbnail_image:
          type: string
          description: 썸네일 이미지 전체 URL
          example: https://pa.foodpang.co/media/resized-product/11/representative_image?tag=1960bebb0250e24cfc19c15c065c7286
        order_closing_time:
          type: string
          nullable: true
          description: 주문 마감 시각 (HH:mm). 상품 개별 마감시간이 없으면 지사 마감시간으로 내려옵니다. 마감시간을 확인할 수 없는 경우 null입니다.
          example: "22:00"
        status:
          type: string
          description: |-
            상품 상태
            - DISABLED: 사용중지
            - SUSPENDED: 일시중지(품절)
            - ENABLED: 사용중
          enum: [DISABLED, SUSPENDED, ENABLED]
          example: ENABLED
